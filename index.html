<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Diario di Bordo</title>
    <script>
      // Bootstrap theme synchronously to avoid flash-of-wrong-theme.
      (function () {
        try {
          var stored = localStorage.getItem("diario.theme"); // "light" | "dark" | "system" | null
          var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
          var mql = window.matchMedia("(prefers-color-scheme: dark)");
          var resolved = mode === "system" ? (mql.matches ? "dark" : "light") : mode;
          var root = document.documentElement;
          if (resolved === "dark") root.classList.add("dark");
          else root.classList.remove("dark");
          root.style.colorScheme = resolved;
        } catch (e) {
          // localStorage may be unavailable — fallback to system preference only.
        }
      })();
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
