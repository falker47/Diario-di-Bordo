name: Keep Supabase Alive

# Genera attivita' di scrittura reale sul DB Supabase ogni 2 giorni
# per evitare l'auto-pause del piano Free.
#
# Il semplice SELECT REST con anon key non e' sufficiente: l'auto-pause
# di Supabase filtra i pattern sintetici (richieste anon regolari).
# Qui facciamo un UPDATE con il service_role su una tabella dedicata
# (_keep_alive, vedi migration 0003): e' una write query non-cacheable
# e l'auth come service_role e' considerata "owner activity".
#
# Dopo il ping, committa un timestamp in .github/last-keep-alive.txt
# per tenere il repo "attivo" ed evitare che GitHub disabiliti i
# workflow schedulati dopo 60 giorni di inattivita' del repo.

on:
  schedule:
    - cron: '0 9 */2 * *'  # ogni 2 giorni alle 09:00 UTC
  workflow_dispatch:        # esecuzione manuale dalla UI di GitHub

permissions:
  contents: write           # necessario per il commit del timestamp

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase via UPDATE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_URL o SUPABASE_SERVICE_ROLE_KEY non configurati nei secrets del repo."
            exit 1
          fi

          # UPDATE _keep_alive set pinged_at = now() where id = 1
          # PATCH genera una query SQL UPDATE reale: scrittura non-cacheable
          # e attivita' visibile nei contatori di Supabase.
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X PATCH \
            "${SUPABASE_URL}/rest/v1/_keep_alive?id=eq.1" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d "{\"pinged_at\":\"${timestamp}\"}")

          echo "HTTP status: ${response}"
          echo "Response body:"
          cat /tmp/body
          echo

          if [ "${response}" -lt 200 ] || [ "${response}" -ge 300 ]; then
            echo "::error::UPDATE fallito (HTTP ${response})."
            exit 1
          fi

          # Verifica che la riga sia stata effettivamente aggiornata.
          # Una PATCH con filtro che non matcha alcuna riga ritorna 200 + [].
          if ! grep -q '"id"' /tmp/body; then
            echo "::error::UPDATE eseguito ma nessuna riga aggiornata. Eseguire la migration 0003_keep_alive.sql sul DB."
            exit 1
          fi

          echo "Ping riuscito — UPDATE registrato sul DB."

      - name: Update keep-alive timestamp
        run: |
          set -euo pipefail
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-keep-alive.txt
          echo "Timestamp aggiornato:"
          cat .github/last-keep-alive.txt

      - name: Commit and push timestamp
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/last-keep-alive.txt

          # git diff --quiet --cached funziona anche su file non ancora
          # tracciati nella HEAD (a differenza di git diff --quiet, che
          # ignora gli untracked e ritorna sempre 0).
          if git diff --quiet --cached; then
            echo "Nessuna modifica da committare."
            exit 0
          fi

          git commit -m "chore: keep-alive ping $(date -u +%Y-%m-%d)"
          git push
